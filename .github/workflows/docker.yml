name: build-and-push

# 构建多架构镜像并推到 GHCR。公开镜像,阿里云集群直接 pull。
# 触发:push 到 dev/main 或打 v*.*.* tag,也可以手动 workflow_dispatch。
on:
  push:
    branches: [dev, main]
    tags: ["v*.*.*"]
  workflow_dispatch:
    inputs:
      tag:
        description: 覆盖镜像 tag(可选)
        required: false

permissions:
  contents: read
  packages: write

env:
  IMAGE: ghcr.io/${{ github.repository_owner }}/fastclaw

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0            # git describe 需要完整历史

      - name: Derive version
        id: meta
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ -n "${{ github.event.inputs.tag }}" ]; then
            echo "version=${{ github.event.inputs.tag }}" >> $GITHUB_OUTPUT
          elif [[ "${{ github.ref }}" == refs/tags/* ]]; then
            echo "version=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
          else
            echo "version=$(git describe --tags --always --dirty)" >> $GITHUB_OUTPUT
          fi
          echo "sha7=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute tags
        id: tags
        run: |
          TAGS="${{ env.IMAGE }}:${{ steps.meta.outputs.version }},${{ env.IMAGE }}:${{ steps.meta.outputs.sha7 }}"
          case "${{ github.ref }}" in
            refs/heads/dev)  TAGS="$TAGS,${{ env.IMAGE }}:dev" ;;
            refs/heads/main) TAGS="$TAGS,${{ env.IMAGE }}:latest" ;;
          esac
          echo "tags=$TAGS" >> $GITHUB_OUTPUT

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.tags.outputs.tags }}
          build-args: |
            VERSION=${{ steps.meta.outputs.version }}
            COMMIT=${{ steps.meta.outputs.sha7 }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

## FastClaw Helm Chart — default values
##
## 与 deploy/k8s/fastclaw.yaml 同语义:env-var 驱动,无 init-container sed,
## workspace 走对象存储(S3 / OSS / R2 / B2 / MinIO …)以便多副本水平扩展。

image:
  repository: ghcr.io/fastclaw-ai/fastclaw
  # 生产环境务必 pin 到 :v0.x.y 或 commit sha,不要用 latest/dev。
  tag: dev
  pullPolicy: IfNotPresent
  # imagePullSecrets:
  #   - name: regcred

## Gateway
gateway:
  replicas: 2
  port: 18953
  resources:
    requests:
      cpu: 250m
      memory: 256Mi
    limits:
      cpu: "2"
      memory: 1Gi
  # 给 SSE/WS 排空时间。preStop sleep 占去大头,剩下留给优雅 shutdown。
  preStopSleepSeconds: 15
  terminationGracePeriodSeconds: 30

## HPA
autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 10
  targetCPUUtilizationPercentage: 60

## PodDisruptionBudget
pdb:
  enabled: true
  minAvailable: 1

## Postgres
##
## 推荐用云厂商托管 PG(RDS / 阿里云 PG)并把 externalDSN 设上;
## 内置 PG 仅适合开发 / 单机验证。
postgres:
  enabled: false                # default off — 生产请用托管 PG
  image: postgres:16-alpine
  password: ""                  # required when enabled=true
  storage: 10Gi
externalDSN: ""                 # postgres://user:pass@host:5432/db?sslmode=require

## 对象存储 — agent workspace artifacts、上传文件、生成的图片/PDF 都落这里。
## 多副本必须配,否则同一 session 文件在不同 pod 看到的内容会不一致。
##
## type 可选:
##   local           pod 本地盘(单副本开发用,生产别开)
##   aws-s3          AWS S3
##   cloudflare-r2   Cloudflare R2(需 accountId)
##   backblaze-b2    Backblaze B2 S3-兼容
##   aliyun-oss      阿里云 OSS
##   minio           自建 MinIO(需 endpoint)
##   s3              其他 S3-兼容(需 endpoint,例:DO Spaces / Wasabi)
objectStore:
  type: local
  bucket: ""
  region: ""
  endpoint: ""                  # MinIO / S3-compatible 时设
  accountId: ""                 # Cloudflare R2 时设
  accessKey: ""                 # 走 Secret 注入,不要 commit 真值
  secretKey: ""
  prefix: ""                    # 多环境共享 bucket 时分前缀
  useSSL: true
  aliyunInternal: false         # ACK 同区域走 OSS 内网

## Sandbox(skill 执行容器)
##
## k8s pod 没有 docker daemon — 只能 e2b(远端)或关闭。
sandbox:
  enabled: false
  backend: e2b                  # "e2b" only(docker 在 k8s 不可用)
  image: fastclaw/sandbox:latest
  e2bApiKey: ""

## Ingress
ingress:
  enabled: false
  className: nginx              # 或 alb(阿里云 ACK ALB)
  host: fastclaw.example.com
  tls: false
  tlsSecret: ""
  certManagerIssuer: ""         # e.g. "letsencrypt-prod"
  proxyBodySize: "32m"
  ## 若用 ALB Ingress (alb.ingress.kubernetes.io/*) 自行 override 这个 map
  annotations: {}

## 额外的 FASTCLAW_* 环境变量(透传 ConfigMap)
extraEnv: {}
  # FASTCLAW_LOG_LEVEL: "info"
  # FASTCLAW_DAEMON_IDLE_TIMEOUT_SECONDS: "300"

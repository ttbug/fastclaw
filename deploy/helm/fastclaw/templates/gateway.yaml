apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "fastclaw.fullname" . }}-gateway
  labels:
    {{- include "fastclaw.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.gateway.replicas }}
  strategy:
    type: RollingUpdate
    rollingUpdate: { maxUnavailable: 0, maxSurge: 1 }
  selector:
    matchLabels:
      app: {{ include "fastclaw.fullname" . }}-gateway
  template:
    metadata:
      labels:
        app: {{ include "fastclaw.fullname" . }}-gateway
    spec:
      {{- with .Values.image.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
      - name: gateway
        image: {{ .Values.image.repository }}:{{ .Values.image.tag }}
        imagePullPolicy: {{ .Values.image.pullPolicy }}
        ports:
        - containerPort: {{ .Values.gateway.port }}
          name: http
        envFrom:
        - configMapRef:
            name: {{ include "fastclaw.fullname" . }}-config
        env:
        - name: FASTCLAW_HOME
          value: "/data/.fastclaw"
        - name: FASTCLAW_STORAGE_DSN
          valueFrom:
            secretKeyRef:
              name: {{ include "fastclaw.fullname" . }}-secrets
              key: STORAGE_DSN
        {{- if and (ne .Values.objectStore.type "local") .Values.objectStore.accessKey }}
        - name: FASTCLAW_OBJECT_STORE_ACCESSKEY
          valueFrom:
            secretKeyRef:
              name: {{ include "fastclaw.fullname" . }}-secrets
              key: OBJECT_STORE_ACCESSKEY
        - name: FASTCLAW_OBJECT_STORE_SECRETKEY
          valueFrom:
            secretKeyRef:
              name: {{ include "fastclaw.fullname" . }}-secrets
              key: OBJECT_STORE_SECRETKEY
        {{- end }}
        {{- if and .Values.sandbox.enabled .Values.sandbox.e2bApiKey }}
        - name: E2B_API_KEY
          valueFrom:
            secretKeyRef:
              name: {{ include "fastclaw.fullname" . }}-secrets
              key: E2B_API_KEY
        {{- end }}
        volumeMounts:
        - name: data
          mountPath: /data/.fastclaw
        resources:
          {{- toYaml .Values.gateway.resources | nindent 10 }}
        # /readyz / /livez 不经过 auth — onboard 前后都能稳定探活。
        # 不要切回 /api/status,那条路径在 onboard 后会 401。
        readinessProbe:
          httpGet:
            path: /readyz
            port: http
          periodSeconds: 5
          failureThreshold: 3
        livenessProbe:
          httpGet:
            path: /livez
            port: http
          initialDelaySeconds: 30
          periodSeconds: 30
        lifecycle:
          preStop:
            exec:
              command: ["sh", "-c", "sleep {{ .Values.gateway.preStopSleepSeconds }}"]
      terminationGracePeriodSeconds: {{ .Values.gateway.terminationGracePeriodSeconds }}
      volumes:
      # /data/.fastclaw 仅承载 pod-local 临时态;workspace artifacts 走对象存储。
      - name: data
        emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "fastclaw.fullname" . }}-gateway
  labels:
    {{- include "fastclaw.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  selector:
    app: {{ include "fastclaw.fullname" . }}-gateway
  # SSE/WS 多副本必须粘连。Ingress 已设 cookie affinity,这里再兜底 ClientIP。
  sessionAffinity: ClientIP
  sessionAffinityConfig:
    clientIP:
      timeoutSeconds: 3600
  ports:
  - port: {{ .Values.gateway.port }}
    targetPort: http
    name: http
{{- if .Values.autoscaling.enabled }}
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: {{ include "fastclaw.fullname" . }}-gateway
  labels:
    {{- include "fastclaw.labels" . | nindent 4 }}
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: {{ include "fastclaw.fullname" . }}-gateway
  minReplicas: {{ .Values.autoscaling.minReplicas }}
  maxReplicas: {{ .Values.autoscaling.maxReplicas }}
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: {{ .Values.autoscaling.targetCPUUtilizationPercentage }}
{{- end }}
{{- if .Values.pdb.enabled }}
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: {{ include "fastclaw.fullname" . }}-gateway
  labels:
    {{- include "fastclaw.labels" . | nindent 4 }}
spec:
  minAvailable: {{ .Values.pdb.minAvailable }}
  selector:
    matchLabels:
      app: {{ include "fastclaw.fullname" . }}-gateway
{{- end }}

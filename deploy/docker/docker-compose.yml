##
## FastClaw — single-machine deployment with Postgres.
##
## Quick start:
##   docker compose up -d
##   open http://localhost:18953        # walks the onboard wizard:
##                                       # super-admin account + first
##                                       # provider + first agent
##
## Or initialize from CLI without opening the web UI:
##   docker compose exec fastclaw fastclaw admin create-user \
##     --username alice --email alice@example.com --password 'hunter2' \
##     --role super_admin
##
## All runtime config goes through FASTCLAW_* env vars — no config file.
##
services:
  fastclaw:
    build:
      context: ../..
      dockerfile: Dockerfile
    image: fastclaw/fastclaw:latest
    restart: unless-stopped
    ports:
      - "${FASTCLAW_PORT:-18953}:18953"
    volumes:
      - fastclaw-data:/data/.fastclaw
    environment:
      # Server default timezone (IANA name). This is the LAST fallback in
      # the chain chatter pref → agent default → system default → TZ —
      # without it the container runs UTC and agents whose chatters never
      # set a timezone get UTC wall clocks and UTC-fired schedules.
      TZ: "${TZ:-Asia/Shanghai}"
      # FASTCLAW_HOME — sqlite db path + sandbox root + skill cache live here
      FASTCLAW_HOME: /data/.fastclaw
      # Bind to all interfaces so the host port mapping works
      FASTCLAW_BIND: all
      FASTCLAW_PORT: "18953"
      # Postgres backend (sqlite would also work; use it by clearing
      # these two and removing the postgres service below)
      FASTCLAW_STORAGE_TYPE: postgres
      FASTCLAW_STORAGE_DSN: "postgres://fastclaw:${POSTGRES_PASSWORD:-fastclaw-secret}@postgres:5432/fastclaw?sslmode=disable"
      FASTCLAW_STORAGE_AUTO_MIGRATE: "true"
      # Sandbox (optional; uncomment to enable)
      # FASTCLAW_SANDBOX_ENABLED: "true"
      # FASTCLAW_SANDBOX_BACKEND: docker
      # FASTCLAW_SANDBOX_IMAGE: python:3.12-slim
    depends_on:
      postgres:
        condition: service_healthy
    command: ["gateway"]

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: fastclaw
      POSTGRES_USER: fastclaw
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-fastclaw-secret}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fastclaw"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  fastclaw-data:
  postgres-data:

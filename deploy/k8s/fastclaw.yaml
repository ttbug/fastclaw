# FastClaw — single-file K8s deployment.
#
# ┌─ ONE-SHOT DEPLOY ──────────────────────────────────────────────────────┐
# │  1. 改 `fastclaw-secrets` 下 4 个值                                    │
# │  2. 在 `fastclaw-config` 里**选一个** object-store provider 块,       │
# │     把旁边其他块保留注释                                                │
# │  3. 改 Ingress 域名(不需要公网就删掉整段 Ingress)                    │
# │  4. kubectl apply -f fastclaw.yaml                                    │
# └────────────────────────────────────────────────────────────────────────┘
#
# 外部前提:
#   - 阿里云 RDS PostgreSQL(或任何 PG 16+),`pg_trgm` 扩展启用
#   - 一个对象存储 bucket(AWS S3 / R2 / B2 / OSS / MinIO 任选)
#   - 镜像:ghcr.io/fastclaw-ai/fastclaw:dev(GitHub Action 自动推送,公开)
#   - 可选:cert-manager + ClusterIssuer(要 HTTPS 的话)

---
apiVersion: v1
kind: Namespace
metadata: { name: fastclaw }

---
# ========================= 改这里(敏感) =========================
apiVersion: v1
kind: Secret
metadata:
  name: fastclaw-secrets
  namespace: fastclaw
type: Opaque
stringData:
  # 管理员 token。生成:openssl rand -hex 32
  AUTH_TOKEN: "REPLACE_WITH_RANDOM_64_HEX"

  # Postgres DSN。阿里云 RDS 建议 sslmode=require。
  STORAGE_DSN: "postgres://fastclaw:PASS@rm-xxxxx.pg.rds.aliyuncs.com:5432/fastclaw?sslmode=require"

  # 对象存储 AK/SK。所有 provider 共用这一对字段:
  #   AWS S3:       Access Key ID / Secret Access Key
  #   R2:           API Token(Access Key ID / Secret Access Key)
  #   Backblaze B2: Key ID / Application Key
  #   Aliyun OSS:   AccessKey / AccessSecret(建议 RAM 子账号,只授一个 bucket)
  #   MinIO:        root user / root password
  OBJECT_STORE_ACCESSKEY: "REPLACE_WITH_ACCESS_KEY"
  OBJECT_STORE_SECRETKEY: "REPLACE_WITH_SECRET_KEY"

---
# ==================== 改这里(object store provider) ==============
# 选 ONE 个 provider,取消对应块的注释,其他保留注释。
#
# FASTCLAW_OBJECT_STORE_TYPE 可选值:
#   local          pod 本地盘(单机 / 开发用)
#   aws-s3         AWS S3
#   cloudflare-r2  Cloudflare R2(需要 ACCOUNTID)
#   backblaze-b2   Backblaze B2 S3-兼容
#   aliyun-oss     阿里云 OSS
#   minio          自建 MinIO(需要 ENDPOINT)
#   s3             其他 S3-兼容(需要 ENDPOINT,例:DO Spaces / Wasabi)
apiVersion: v1
kind: ConfigMap
metadata:
  name: fastclaw-config
  namespace: fastclaw
data:
  FASTCLAW_MODE: "cloud"
  FASTCLAW_PORT: "18953"
  FASTCLAW_BIND: "all"
  FASTCLAW_STORAGE_TYPE: "postgres"

  # ─── Provider 1: 阿里云 OSS(默认示例) ───
  FASTCLAW_OBJECT_STORE_TYPE: "aliyun-oss"
  FASTCLAW_OBJECT_STORE_REGION: "cn-hangzhou"
  FASTCLAW_OBJECT_STORE_BUCKET: "your-fastclaw-bucket"
  FASTCLAW_OBJECT_STORE_ALIYUN_INTERNAL: "true"    # ACK 同区域走内网,省 egress

  # ─── Provider 2: AWS S3 ───
  # FASTCLAW_OBJECT_STORE_TYPE: "aws-s3"
  # FASTCLAW_OBJECT_STORE_REGION: "us-east-1"
  # FASTCLAW_OBJECT_STORE_BUCKET: "your-fastclaw-bucket"

  # ─── Provider 3: Cloudflare R2 ───
  # FASTCLAW_OBJECT_STORE_TYPE: "cloudflare-r2"
  # FASTCLAW_OBJECT_STORE_ACCOUNTID: "<cloudflare-account-id>"
  # FASTCLAW_OBJECT_STORE_BUCKET: "your-fastclaw-bucket"

  # ─── Provider 4: Backblaze B2 ───
  # FASTCLAW_OBJECT_STORE_TYPE: "backblaze-b2"
  # FASTCLAW_OBJECT_STORE_REGION: "us-west-004"
  # FASTCLAW_OBJECT_STORE_BUCKET: "your-fastclaw-bucket"

  # ─── Provider 5: 自建 MinIO(集群内网) ───
  # FASTCLAW_OBJECT_STORE_TYPE: "minio"
  # FASTCLAW_OBJECT_STORE_ENDPOINT: "minio.default.svc.cluster.local:9000"
  # FASTCLAW_OBJECT_STORE_BUCKET: "fastclaw"
  # FASTCLAW_OBJECT_STORE_USESSL: "false"

  # ─── Provider 6: 其他 S3-兼容(DigitalOcean Spaces / Wasabi / …) ───
  # FASTCLAW_OBJECT_STORE_TYPE: "s3"
  # FASTCLAW_OBJECT_STORE_ENDPOINT: "nyc3.digitaloceanspaces.com"
  # FASTCLAW_OBJECT_STORE_REGION: "nyc3"
  # FASTCLAW_OBJECT_STORE_BUCKET: "your-fastclaw-bucket"

  # 可选:多环境共享一个 bucket 时分前缀
  # FASTCLAW_OBJECT_STORE_PREFIX: "prod"

  # Sandbox(可选)
  # FASTCLAW_SANDBOX_BACKEND: "e2b"

---
# =================== 应用层(通常不动) ===========================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: fastclaw
  namespace: fastclaw
  labels: { app: fastclaw }
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate: { maxUnavailable: 0, maxSurge: 1 }
  selector: { matchLabels: { app: fastclaw } }
  template:
    metadata: { labels: { app: fastclaw } }
    spec:
      containers:
        - name: fastclaw
          image: ghcr.io/fastclaw-ai/fastclaw:dev    # 生产建议 pin 到 :<sha7> 或 :vX.Y.Z
          imagePullPolicy: IfNotPresent
          ports:
            - { name: http, containerPort: 18953 }
          envFrom:
            - configMapRef: { name: fastclaw-config }
          env:
            - { name: FASTCLAW_AUTH_TOKEN,              valueFrom: { secretKeyRef: { name: fastclaw-secrets, key: AUTH_TOKEN } } }
            - { name: FASTCLAW_STORAGE_DSN,             valueFrom: { secretKeyRef: { name: fastclaw-secrets, key: STORAGE_DSN } } }
            - { name: FASTCLAW_OBJECT_STORE_ACCESSKEY,  valueFrom: { secretKeyRef: { name: fastclaw-secrets, key: OBJECT_STORE_ACCESSKEY } } }
            - { name: FASTCLAW_OBJECT_STORE_SECRETKEY,  valueFrom: { secretKeyRef: { name: fastclaw-secrets, key: OBJECT_STORE_SECRETKEY } } }
            # - { name: E2B_API_KEY, valueFrom: { secretKeyRef: { name: fastclaw-secrets, key: E2B_API_KEY } } }
          volumeMounts:
            - { name: data, mountPath: /data/.fastclaw }
          # /healthz / /readyz 不经过 auth 中间件,K8s 直接探活。别用
          # /api/status —— 它被 userAuth 包住了,匿名请求一律 401。
          readinessProbe:
            httpGet: { path: /readyz, port: http }
            periodSeconds: 5
            failureThreshold: 3
          livenessProbe:
            httpGet: { path: /livez, port: http }
            initialDelaySeconds: 30
            periodSeconds: 30
          resources:
            requests: { cpu: "100m", memory: "128Mi" }
            limits:   { cpu: "1",    memory: "512Mi" }
          lifecycle:
            preStop:
              exec: { command: ["sh", "-c", "sleep 5"] }
      terminationGracePeriodSeconds: 30
      volumes:
        - { name: data, emptyDir: {} }

---
apiVersion: v1
kind: Service
metadata:
  name: fastclaw
  namespace: fastclaw
spec:
  type: ClusterIP
  selector: { app: fastclaw }
  ports:
    - { name: http, port: 80, targetPort: http }

---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: fastclaw
  namespace: fastclaw
spec:
  scaleTargetRef: { apiVersion: apps/v1, kind: Deployment, name: fastclaw }
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target: { type: Utilization, averageUtilization: 60 }

---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: fastclaw
  namespace: fastclaw
spec:
  minAvailable: 1
  selector: { matchLabels: { app: fastclaw } }

---
# ========================= 改这里(域名) ========================
# 不需要公网就整段删掉。
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: fastclaw
  namespace: fastclaw
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    nginx.ingress.kubernetes.io/proxy-body-size: "32m"
spec:
  ingressClassName: nginx
  tls:
    - hosts: [fastclaw.example.com]
      secretName: fastclaw-tls
  rules:
    - host: fastclaw.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service: { name: fastclaw, port: { number: 80 } }
